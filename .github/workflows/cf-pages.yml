name: Deploy landing → Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/landing/**'
      - '.github/workflows/cf-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy alwayslink
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/landing --project-name=alwayslink --branch=main --commit-hash=${{ github.sha }}

      - name: Annotate deployment URL
        if: success()
        run: echo "::notice title=Cloudflare Pages::Deployed → ${{ steps.deploy.outputs.deployment-url }}"
